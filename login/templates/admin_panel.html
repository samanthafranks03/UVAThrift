<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <title>Admin Control Panel</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f4f4; }
        .container { background: #fff; padding: 20px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); margin: 40px auto; max-width: 600px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 8px; border-bottom: 1px solid #ddd; text-align: left; }
        th { background: #eee; }
        .ban-btn { background: #d9534f; color: #fff; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; }
        .ban-btn:disabled { background: #aaa; }
    </style>
</head>
<body>
<div class="container">
    <h2>All Users</h2>
    <table>
        <tr><th>Name</th><th>Email</th><th>Banned?</th><th>Action</th></tr>
        {% for user in users %}
        <tr>
            <td>{{ user.name }}</td>
            <td>{{ user.email }}</td>
            <td>{% if user.is_flagged %}Yes{% else %}No{% endif %}</td>
            <td>
                {% if not user.is_flagged %}
                <form method="post" action="/login/ban-user/">
                    {% csrf_token %}
                    <input type="hidden" name="email" value="{{ user.email }}" />
                    <button type="submit" class="ban-btn">Ban</button>
                </form>
                {% else %}
                <form method="post" action="/login/unban-user/">
                    {% csrf_token %}
                    <input type="hidden" name="email" value="{{ user.email }}" />
                    <button type="submit" class="ban-btn" style="background:#5cb85c;">Unban</button>
                </form>
                {% endif %}
            </td>
        </tr>
        {% endfor %}
    </table>
</div>
</body>
</html>
