<h2>Community Feed</h2>

{% if request.session.user_data %}
<form method="post" action="{% url 'create_post' %}">
  {% csrf_token %}
  <textarea
    name="content"
    rows="3"
    placeholder="Write something..."
    required
  ></textarea
  ><br />
  <button type="submit">Post</button>
</form>
{% endif %}

<hr />

{% for post in posts %}
<div class="post">
  <h3>{{ post.title }}</h3>
  <p>{{ post.content }}</p>
  <form
    method="POST"
    action="{% url 'messaging:send-message' post.author.id %}"
  >
    {% csrf_token %}
    <input
      type="text"
      name="content"
      placeholder="Write your message..."
      required
    />
    <button type="submit">Message {{ post.author.username }}</button>
  </form>
</div>
{% endfor %}
