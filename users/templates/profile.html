<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <title>Profile</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background-color: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        img {
            border-radius: 50%;
            width: 100px;
            height: 100px;
            object-fit: cover;
            margin-top: 10px;
        }

        p {
            color: #333;
            margin: 10px 0;
        }

        a {
            color: #007bff;
            text-decoration: none;
            font-weight: bold;
        }

        a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>
<div class="container">
    <h1>{{ object.name }}</h1>
    <p>{{ object.bio }}</p>
    <p>{{ object.interests }}</p>
    {% if request.session.is_admin %}
    <p>
    <a href="/login/admin-panel/" style="background:#ffd700;color:#000;padding:8px 16px;border-radius:5px;font-weight:bold;text-decoration:none;">Admin Control Panel</a>
    </p>
    {% endif %}
</div>
</body>
</html>
