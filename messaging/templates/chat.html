<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chat</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        background: #f3f3f3;
        margin: 0;
        padding: 0;
      }
      .header {
        background: #333;
        color: #fff;
        padding: 10px 20px;
      }
      .container {
        max-width: 700px;
        margin: 30px auto;
        background: #fff;
        border-radius: 10px;
        padding: 20px;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
      }
      .messages {
        max-height: 400px;
        overflow-y: auto;
        margin-bottom: 15px;
        padding: 10px;
        border: 1px solid #ccc;
        border-radius: 6px;
      }
      textarea {
        width: 100%;
        height: 80px;
        resize: none;
        padding: 8px;
      }
      .button {
        margin-top: 5px;
        background: #4caf50;
        color: white;
        border: none;
        padding: 8px 16px;
        border-radius: 4px;
        cursor: pointer;
      }
      .button:hover {
        background: #45a049;
      }
      .message-box {
        border-bottom: 1px solid #ddd;
        padding: 6px 0;
      }
      .message-author {
        font-weight: bold;
      }
      .message-content {
        margin-left: 10px;
      }
    </style>
  </head>

  <body>
    <div class="header">
      <h1>Welcome, {{ request.user.username }}</h1>
    </div>

    <div class="container">
      <div class="messages">
        <div id="sse-data"></div>
      </div>

      <form @submit.prevent="submit" x-data="{ state: 'composing', errors: {} }">
        {% csrf_token %}
        <div>
          <textarea
            name="content"
            @input="state = 'composing'"
            placeholder="Type your message..."
            required
          ></textarea>
          <button class="button">Send</button>
        </div>

        <div x-show="state === 'error'">
          <p style="color:red;">Error sending your message ❌</p>
        </div>
      </form>
    </div>

    <script>
      const sseData = document.getElementById('sse-data')
      let eventSource

      function startSSE() {
        // ✅ Update path to include /messaging/
        eventSource = new EventSource('/messaging/stream-chat-messages/')
        eventSource.onmessage = (event) => {
          const data = JSON.parse(event.data)
          const messageHTML = `
            <div class="message-box">
              <div class="message-author">${data.author__name}</div>
              <div class="message-content">${data.content}</div>
            </div>`
          sseData.innerHTML += messageHTML
          sseData.scrollTop = sseData.scrollHeight
        }
      }

      if (typeof EventSource !== 'undefined') {
        startSSE()
      } else {
        sseData.innerHTML =
          "Whoops! Your browser doesn't support server-sent events."
      }

      async function submit(event) {
        event.preventDefault()
        const formData = new FormData(event.target)

        const endpointUrl = '/messaging/create-message/' // ✅ Updated
        const response = await fetch(endpointUrl, {
          method: 'POST',
          body: formData,
          headers: {
            'X-CSRFToken': '{{ csrf_token }}',
          },
        })

        if (!response.ok) {
          alert('Error sending message ❌')
        } else {
          event.target.reset()
        }
      }
    </script>

    <script
      defer
      src="https://cdn.jsdelivr.net/npm/alpinejs@3.12.3/dist/cdn.min.js"
    ></script>
  </body>
</html>
