{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Inbox</title>
  <link rel="stylesheet" href="{% static 'messaging/inbox.css' %}">
</head>
<body>
  <header class="inbox-header">
    <h1>{{ request.user.username }}'s Inbox</h1>
    <a href="{% url 'messaging:create-message' %}" class="new-message-btn" title="Write new message">
      🖊️
    </a>
  </header>

  <main class="inbox-container">
    {% if messages %}
      {% for msg in messages %}
        <div class="message-card">
          <p class="message-content">{{ msg.content }}</p>
          <p class="message-time">{{ msg.created_at|date:"M d, Y H:i" }}</p>
        </div>
      {% endfor %}
    {% else %}
      <p>No messages yet.</p>
    {% endif %}
  </main>
</body>
</html>
