{% extends "a2_market/base.html" %}

{% block content %}
<div class="container mt-4" style="max-width: 600px;">
  <h2 class="mb-3 text-center">{{ group.name }}</h2>

  <div class="border rounded p-3 mb-3" style="max-height: 400px; overflow-y: auto;">
    {% for msg in messages %}
      <div class="mb-3">
        <strong>{{ msg.author.username }}</strong>: {{ msg.content }}
        <br>
        <small class="text-muted">{{ msg.timestamp|date:"M d, H:i" }}</small>
      </div>
    {% empty %}
      <p class="text-muted">No messages yet.</p>
    {% endfor %}
  </div>

  <form method="post" action="{% url 'messaging:send-group-message' group.id %}">
    {% csrf_token %}
    <div class="input-group">
      <input type="text" name="content" class="form-control" placeholder="Type your message..." required>
      <button type="submit" class="btn btn-success">Send</button>
    </div>
  </form>

  <div class="mt-3 text-center">
    <a href="{% url 'messaging:chat-list' %}" class="btn btn-secondary">Back to Chats</a>
  </div>
</div>
{% endblock %}
