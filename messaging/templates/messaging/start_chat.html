<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Start a Chat</title>
  <style>
    body {
      margin: 0;
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
      background-color: #fafafa;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .chat-header {
        position: relative;
        background: linear-gradient(135deg, green, green);
        color: white;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: 600;
        box-shadow: 0 2px 6px rgba(0, 0, 0, 0.15);
        text-align: center;
      }

      .back-arrow {
        position: absolute;
        left: 20px;
        top: 50%;
        transform: translateY(-50%);
        text-decoration: none;
        color: white;
        font-size: 22px;
        font-weight: bold;
      }
    .chat-list {
      flex-grow: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }
    .chat-card {
      width: 90%;
      max-width: 500px;
      background-color: #fff;
      border-radius: 14px;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
    }
    .chat-info {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .profile-circle {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      background: linear-gradient(135deg, green, green);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      font-weight: 600;
      text-transform: uppercase;
    }
    .chat-username {
      font-weight: 600;
      font-size: 16px;
    }
    .chat-preview {
      font-size: 13px;
      color: #777;
      margin-top: 3px;
    }
  </style>
</head>
<body>
  <div class="chat-header">Start a Chat
    <div class="chat-header-content">
      <a href="/messaging/" class="back-arrow">←</a>
    </div>
  </div>
  

  <form method="get" style="padding: 20px; text-align: center;">
    <input
      type="text"
      name="search"
      value="{{ search_query }}"
      placeholder="Search users..."
      style="width: 90%; max-width: 500px; padding: 10px 14px; border-radius: 10px; border: 1px solid #ccc;"
    />
  </form>

  <form method="post" class="chat-list">
    {% csrf_token %}
    {% for user in users %}
      <div class="chat-card">
        <label style="display: flex; align-items: center; gap: 12px; width: 100%;">
          <input type="checkbox" name="members" value="{{ user.id }}" style="transform: scale(1.2); margin-right: 8px;" />
          <div class="chat-info">
            <div class="profile-circle">{{ user.display_name|slice:":1" }}</div>
            <div>
              <div class="chat-username">{{ user.display_name }}</div>
              <div class="chat-preview" style="font-size: 11px; color: #999;">{{ user.username }}</div>
            </div>
          </div>
        </label>
      </div>
    {% empty %}
      <div class="chat-preview">No users found.</div>
    {% endfor %}
    <button type="submit" style="margin-top: 20px; background-color: green; color: white; padding: 10px 20px; border-radius: 8px; border: none;">
      Start Chat
    </button>
  </form>
</body>
</html>
