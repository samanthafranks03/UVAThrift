<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Your Chats</title>
    <style>
      body {
        margin: 0;
        font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
        background-color: #fafafa;
        height: 100vh;
        display: flex;
        flex-direction: column;
      }

      /* Header */
      .chat-header {
        background: linear-gradient(135deg, #0095f6, #0056b3);
        color: white;
        padding: 15px 20px;
        text-align: center;
        font-size: 18px;
        font-weight: 600;
        box-shadow: 0 2px 6px rgba(0, 0, 0, 0.15);
      }

      /* Chat list container */
      .chat-list {
        flex-grow: 1;
        overflow-y: auto;
        padding: 20px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 12px;
      }

      /* Chat preview cards */
      .chat-card {
        width: 90%;
        max-width: 500px;
        background-color: #fff;
        border-radius: 14px;
        padding: 12px 16px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        text-decoration: none;
        color: black;
        box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
        transition: transform 0.15s ease, box-shadow 0.15s ease;
      }

      .chat-card:hover {
        transform: translateY(-2px);
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.15);
      }

      .chat-info {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      /* Profile circle with initials */
      .profile-circle {
        width: 46px;
        height: 46px;
        border-radius: 50%;
        background: linear-gradient(135deg, #0095f6, #00c6ff);
        color: white;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 20px;
        font-weight: 600;
        text-transform: uppercase;
        flex-shrink: 0;
      }

      .chat-username {
        font-weight: 600;
        font-size: 16px;
      }

      .chat-preview {
        font-size: 13px;
        color: #777;
        margin-top: 3px;
      }

      .empty {
        color: #777;
        text-align: center;
        margin-top: 100px;
        font-size: 15px;
      }

      /* Scrollbar */
      ::-webkit-scrollbar {
        width: 6px;
      }
      ::-webkit-scrollbar-thumb {
        background: rgba(0, 0, 0, 0.2);
        border-radius: 3px;
      }
    </style>
  </head>
  <body>
    <div class="chat-header">{{ request.user.username }}’s Messages</div>

    <div class="chat-list">
      {% if users %} {% for user in users %}
      <a class="chat-card" href="{% url 'messaging:chat' user.username %}">
        <div class="chat-info">
          <div class="profile-circle">{{ user.username|slice:":1" }}</div>
          <div>
            <div class="chat-username">{{ user.username }}</div>
            <div class="chat-preview">Click to open conversation</div>
          </div>
        </div>
        <span style="color: #ccc">›</span>
      </a>
      {% endfor %} {% else %}
      <div class="empty">No chats yet. Start a conversation!</div>
      {% endif %}
    </div>
  </body>
</html>
